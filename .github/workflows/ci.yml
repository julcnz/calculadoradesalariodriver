# Lint + typecheck + build en cada push/PR a main.
# No necesita base de datos: `prisma generate` (postinstall) solo lee el
# esquema, y el build no ejecuta consultas.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      AUTH_SECRET: "solo-para-ci-no-usar-en-produccion"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Igual que la máquina que genera package-lock.json (npm 11);
          # npm 10 valida el lock distinto y falla con EUSAGE.
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
