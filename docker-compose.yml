# PostgreSQL para desarrollo local.
# Uso: docker compose up -d
# La connection string correspondiente está documentada en .env.example
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calculadoradriver
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calculadoradriver"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
